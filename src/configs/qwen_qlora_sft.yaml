# LLaMA-Factory QLoRA SFT for the Hypothesis-Ledger samples (mixed audit/propose/fix, one run).
# Train on a rented GPU (AutoDL A100-80G / H100). Swap model_name_or_path for 14B/32B to scale.

### model
model_name_or_path: Qwen/Qwen2.5-Coder-7B-Instruct   # -> Qwen2.5-Coder-14B/32B-Instruct to scale (32B: H100)
quantization_bit: 4
quantization_method: bnb
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: hl_sft
dataset_dir: dataset/sft           # the folder holding dataset_info.json + train_sharegpt.jsonl
template: qwen
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: out/qwen2.5-coder-7b-hlsft
logging_steps: 5
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
